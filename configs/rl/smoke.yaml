# Tiny time-boxed SAC run for tests / CI. Same env + baseline as default; only
# the algorithm budget and training length are shrunk so a smoke test finishes
# in seconds. Never used for the real comparison.
#   python scripts/train_rl.py rl=smoke

algo:
  _target_: stable_baselines3.SAC
  policy: MlpPolicy
  learning_rate: 3.0e-4
  buffer_size: 5000
  batch_size: 64
  gamma: 0.99
  tau: 0.02
  learning_starts: 200
  train_freq: 1
  gradient_steps: 1
  ent_coef: auto
  policy_kwargs:
    net_arch: [64, 64]
  verbose: 0
  seed: 0

env:
  forecast_horizon_k: 8
  power_scale: 4.0
  price_scale: 200.0
  reward:
    co2_price: 30.0
    cost_scale: 100.0
    w_soc: 1500.0
    w_peak: 40.0

train:
  total_timesteps: 4000
  eval_freq: 2000
  n_eval_days: 3
  checkpoint_freq: 2000
  seed: 0
  resume: false                # smoke always starts fresh
  max_seconds: null
  forecast_source: auto
  out_dir: models/rl_smoke

baseline:
  charge_rate_frac: 1.0
  discharge_rate_frac: 1.0
